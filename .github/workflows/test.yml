name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:21-jdk-noble
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run tests
        run: ./scripts/task_linux.bash test
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: screen_capture.webm
